<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Phone camera — Tabletop Perception</title>
<style>
  :root { --navy: #012169; --ink: #1a1a1a; --bg: #0c0c0c; --whisper: #F3F2F1; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: white; font: 15px/1.45 system-ui, -apple-system, sans-serif; min-height: 100dvh; }
  .wrap { max-width: 520px; margin: 0 auto; padding: 20px; }
  h1 { color: white; margin: 0 0 4px; font-size: 18px; }
  .sub { color: rgba(255,255,255,0.6); font-size: 13px; margin-bottom: 16px; }
  .video-wrap { position: relative; width: 100%; aspect-ratio: 3/4; background: #000; border-radius: 12px; overflow: hidden; }
  video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .status { position: absolute; bottom: 12px; left: 12px; right: 12px; background: rgba(0,0,0,0.55); backdrop-filter: blur(16px); padding: 8px 12px; border-radius: 8px; font-size: 12px; }
  button { font: inherit; padding: 12px 20px; min-height: 48px; background: var(--navy); color: white; border: 0; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 14px; font-weight: 600; }
  button:disabled { opacity: 0.5; }
  .note { color: rgba(255,255,255,0.5); font-size: 12px; margin-top: 12px; text-align: center; line-height: 1.5; }

  .debug-panel {
    margin-top: 16px;
    background: rgba(0, 0, 0, 0.6);
    color: #c0e7ff;
    font: 11px/1.45 ui-monospace, "SF Mono", monospace;
    border-radius: 10px;
    border: 1px solid rgba(124, 255, 181, 0.22);
    padding: 12px 14px;
    max-height: 50vh;
    overflow: auto;
  }
  .debug-panel h3 { color: #fff; margin: 0 0 6px; font: 600 12px/1.3 system-ui; }
  .debug-panel h3:not(:first-child) { margin-top: 10px; }
  .debug-panel .row { display: grid; grid-template-columns: 100px 1fr; gap: 3px 10px; }
  .debug-panel .k { color: #8aa0b0; }
  .debug-panel .v { color: #e5f3ff; word-break: break-all; }
  .debug-panel .v.good { color: #7cffb5; }
  .debug-panel .v.warn { color: #ffd28a; }
  .debug-panel .v.bad  { color: #ff9d8a; }
  .debug-panel .log { background: rgba(255,255,255,0.04); padding: 6px 8px; border-radius: 4px; max-height: 180px; overflow: auto; font-size: 10.5px; }
  .debug-panel .log div { line-height: 1.4; opacity: 0.9; white-space: pre-wrap; word-break: break-all; }
</style>
</head>
<body>

<div class="wrap">
  <h1>Phone camera</h1>
  <div class="sub">Streams your rear camera to the desktop demo. Keep this tab open while demoing.</div>

  <div class="video-wrap">
    <video id="preview" playsinline muted autoplay></video>
    <div class="status" id="status">tap Start to begin</div>
  </div>

  <button id="start">Start camera and connect</button>

  <div class="note">Works best on Chrome or Safari. Keep the screen awake during the demo.</div>

  <div id="debug-panel" class="debug-panel" style="display:none">
    <h3>webrtc</h3>
    <div id="dbg-state" class="row"><span class="k">status:</span><span class="v">idle</span></div>
    <h3>log</h3>
    <div class="log" id="dbg-log"></div>
  </div>
</div>

<script type="module">
import { startPhone, onDebugLog, DEBUG } from '../webrtc.js';

const params = new URLSearchParams(location.search);
const room = params.get('peer') || params.get('room');
const statusEl = document.getElementById('status');
const btn = document.getElementById('start');
const video = document.getElementById('preview');

function setStatus(t) { statusEl.textContent = t; }

if (!room) {
  setStatus('no room id in URL — go back to the desktop demo');
  btn.disabled = true;
}

let phoneHandle = null;

if (DEBUG) {
  const dp = document.getElementById('debug-panel');
  dp.style.display = '';
  const logEl = document.getElementById('dbg-log');
  const appendLog = (line) => {
    const div = document.createElement('div');
    div.textContent = line;
    logEl.appendChild(div);
    while (logEl.children.length > 120) logEl.removeChild(logEl.firstChild);
    logEl.scrollTop = logEl.scrollHeight;
  };
  onDebugLog((line) => appendLog(line));
  appendLog(`${new Date().toISOString().slice(11,23)} debug panel attached`);

  const iceClass = (st) => {
    if (st === 'connected' || st === 'completed') return 'good';
    if (st === 'checking' || st === 'new' || st === 'disconnected') return 'warn';
    if (st === 'failed' || st === 'closed') return 'bad';
    return '';
  };

  setInterval(async () => {
    const host = document.getElementById('dbg-state');
    if (!phoneHandle || !phoneHandle.getState) {
      host.innerHTML = `<span class="k">status:</span><span class="v">idle (waiting on Start)</span>`;
      return;
    }
    const s = phoneHandle.getState();
    const stats = await phoneHandle.getStats().catch(() => null);
    const pc = s.pc || {};
    const rtt = stats ? ((stats.currentRoundTripTime || 0) * 1000).toFixed(0) + ' ms' : '–';
    const localCand  = stats?.local  ? `${stats.local.type}/${stats.local.protocol}`   : '–';
    const remoteCand = stats?.remote ? `${stats.remote.type}/${stats.remote.protocol}` : '–';
    host.innerHTML = `
      <span class="k">peerId:</span><span class="v">${s.peerId}</span>
      <span class="k">room:</span><span class="v">${s.roomId}</span>
      <span class="k">signaling:</span><span class="v">${s.signalingUrl}</span>
      <span class="k">ws:</span><span class="v ${s.ws === 'OPEN' ? 'good' : 'warn'}">${s.ws}</span>
      <span class="k">pc.signaling:</span><span class="v">${pc.signalingState || '–'}</span>
      <span class="k">pc.ice:</span><span class="v ${iceClass(pc.iceConnectionState)}">${pc.iceConnectionState || '–'}</span>
      <span class="k">pc.conn:</span><span class="v ${iceClass(pc.connectionState)}">${pc.connectionState || '–'}</span>
      <span class="k">pc.gather:</span><span class="v">${pc.iceGatheringState || '–'}</span>
      <span class="k">pending ice:</span><span class="v">${s.pendingIce}</span>
      <span class="k">negotiating:</span><span class="v">${s.negotiating}</span>
      <span class="k">local cand:</span><span class="v">${localCand}</span>
      <span class="k">remote cand:</span><span class="v">${remoteCand}</span>
      <span class="k">rtt:</span><span class="v">${rtt}</span>
      <span class="k">rx/tx bytes:</span><span class="v">${stats?.bytesReceived || 0} / ${stats?.bytesSent || 0}</span>
    `;
  }, 500);
}

btn.addEventListener('click', async () => {
  btn.disabled = true;
  setStatus('requesting camera...');
  try {
    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false,
      });
    } catch {
      stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
    }
    video.srcObject = stream;
    setStatus('connecting...');
    const handle = await startPhone(room, stream, {
      onStatus: (s) => setStatus('webrtc: ' + s),
    });
    phoneHandle = handle;
    window._phone = handle;
    btn.textContent = 'Connected — keep tab open';
  } catch (e) {
    setStatus('error: ' + e.message);
    btn.disabled = false;
  }
});
</script>

</body>
</html>
